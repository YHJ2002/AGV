<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Map Editor - Custom Goods IDs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #212529;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        h1 { color: #343a40; font-weight: 500; }
        #canvas-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }
        canvas {
            border: 1px solid #dee2e6;
            background-color: #f8f9fa;
            cursor: crosshair;
            box-shadow: 0 10px 35px rgba(0,0,0,0.12);
            border-radius: 16px;
            transition: box-shadow 0.3s;
        }
        canvas:hover { box-shadow: 0 15px 45px rgba(0,0,0,0.18); }
        .sidebar {
            background-color: #f8f9fa;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            border: 1px solid #e9ecef;
        }
        .btn-mode {
            margin: 8px 0;
            width: 100%;
            font-weight: 600;
            transition: all 0.25s;
        }
        .btn-mode:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.12);
        }
        #status {
            margin-top: 12px;
            font-size: 0.95em;
            color: #6c757d;
            font-weight: 500;
        }
        #export-btn {
            margin-top: 24px;
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            border: none;
            color: white;
            font-weight: 600;
        }
        #export-btn:hover { background: linear-gradient(135deg, #0b5ed7, #0946a0); }
        #agv-count {
            font-weight: 700;
            color: #198754;
        }
        .info-panel {
            background-color: #f8f9fa;
            padding: 16px 24px;
            border-radius: 12px;
            border: 1px solid #dee2e6;
            margin-bottom: 24px;
            font-size: 1.05em;
        }
        .size-select, .goods-input {
            margin: 16px 0;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ced4da;
            width: 100%;
        }
        #reset-btn {
            margin-top: 12px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center my-5">Warehouse Map Editor</h1>
        <div class="row g-4">
            <div class="col-md-3">
                <div class="sidebar">
                    <h5 class="mb-4" style="color:#495057;">Mode & Size</h5>
                    
                    <button class="btn btn-mode" style="background:#0d6efd;color:white;" onclick="setMode(1)">Shelf</button>
                    <button class="btn btn-mode" style="background:#dc3545;color:white;" onclick="setMode(2)">Receiver</button>
                    <button class="btn btn-mode" style="background:#6c757d;color:white;" onclick="setMode(3)">Obstacle</button>
                    <button class="btn btn-mode" style="background:#198754;color:white;" onclick="setMode(4)">Wait Zone (AGV)</button>

                    <select id="size-select" class="size-select" onchange="currentSize = parseInt(this.value)">
                        <option value="1" selected>Size = 1 (default)</option>
                        <option value="2">Size = 2 (2×2)</option>
                    </select>

                    <input id="goods-ids-input" class="goods-input" type="text" placeholder="Goods IDs for Shelf (comma separated, e.g. 100,101,102 - optional)">

                    <hr style="border-color:#ced4da;">
                    <p style="color:#6c757d; font-size:0.95em;">
                        Left click → place at top-left<br>
                        Right click → remove whole object
                    </p>
                    
                    <button id="export-btn" class="btn btn-lg w-100" onclick="exportMap()">Export Map (S / Enter)</button>
                    <button id="reset-btn" class="btn btn-secondary" onclick="resetMap()">Reset Map</button>
                    <div id="status" class="mt-3"></div>
                </div>
            </div>
            <div class="col-md-9">
                <div class="info-panel">
                    <span id="agv-count">Wait Zones: 0 → Will generate 0 AGVs</span>
                </div>
                <div id="canvas-container">
                    <canvas id="map-canvas" width="900" height="675"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const W = 20;
        const H = 15;
        const CELL = 45;
        const canvas = document.getElementById('map-canvas');
        const ctx = canvas.getContext('2d');
        
        // grid 存储类型值（1~4）
        let grid = Array.from({length: H}, () => Array(W).fill(0));
        // 额外存储 size 和 goods_ids（仅shelf）信息：只在左上角格子记录 {type:1~4, size:1|2, goods_ids: [nums] if type=1}
        let objects = {};  // key: "x,y" → {type, size, goods_ids?}

        let mode = 1;
        let currentSize = 1;

        // 颜色（size=2 会稍暗一些）
        const baseColors = [
            '#f8f9fa',    // 0
            '#0d6efd',    // 1 shelf
            '#dc3545',    // 2 receiver
            '#6c757d',    // 3 obstacle
            '#198754'     // 4 wait zone
        ];

        const modeNames = ['', 'Shelf', 'Receiver', 'Obstacle', 'Wait Zone'];
        const modeStatusColors = ['', '#0d6efd', '#dc3545', '#6c757d', '#198754'];

        function canPlace(x, y, sz) {
            if (x + sz > W || y + sz > H) return false;
            for (let dy = 0; dy < sz; dy++) {
                for (let dx = 0; dx < sz; dx++) {
                    if (grid[y + dy][x + dx] !== 0) return false;
                }
            }
            return true;
        }

        function placeObject(x, y, type, sz) {
            if (!canPlace(x, y, sz)) return false;
            for (let dy = 0; dy < sz; dy++) {
                for (let dx = 0; dx < sz; dx++) {
                    grid[y + dy][x + dx] = type;
                }
            }
            // 记录对象
            const obj = { type, size: sz };
            if (type === 1) {  // Shelf: 处理 goods_ids
                const inputVal = document.getElementById('goods-ids-input').value.trim();
                if (inputVal) {
                    const ids = inputVal.split(',')
                        .map(id => id.trim())
                        .filter(id => id !== '')
                        .map(id => parseInt(id))
                        .filter(id => !isNaN(id));
                    if (ids.length > 0) {
                        obj.goods_ids = ids;
                    }
                }
                // 如果没有有效输入，稍后在导出时默认使用 [box_id]
            }
            objects[`${x},${y}`] = obj;
            return true;
        }

        function removeObjectAt(x, y) {
            const type = grid[y][x];
            if (type === 0) return false;

            let foundKey = null;
            for (let key in objects) {
                const [ox, oy] = key.split(',').map(Number);
                const {size} = objects[key];
                if (x >= ox && x < ox + size && y >= oy && y < oy + size) {
                    foundKey = key;
                    break;
                }
            }

            if (foundKey) {
                const [ox, oy] = foundKey.split(',').map(Number);
                const size = objects[foundKey].size;
                for (let dy = 0; dy < size; dy++) {
                    for (let dx = 0; dx < size; dx++) {
                        grid[oy + dy][ox + dx] = 0;
                    }
                }
                delete objects[foundKey];
                return true;
            } else {
                grid[y][x] = 0;
                return true;
            }
        }

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let y = 0; y < H; y++) {
                for (let x = 0; x < W; x++) {
                    const type = grid[y][x];
                    let col = baseColors[type];

                    if (type !== 0 && type !== 3) {
                        let isSize2 = false;
                        for (let key in objects) {
                            const [ox, oy] = key.split(',').map(Number);
                            const sz = objects[key].size;
                            if (sz === 2 && x >= ox && x < ox + 2 && y >= oy && y < oy + 2) {
                                isSize2 = true;
                                break;
                            }
                        }
                        if (isSize2) col = shadeColor(col, -20);
                    }

                    ctx.fillStyle = col;
                    ctx.fillRect(x * CELL, y * CELL, CELL, CELL);

                    ctx.strokeStyle = '#dee2e6';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x * CELL, y * CELL, CELL, CELL);
                }
            }

            // size=2 提示文字
            ctx.font = 'bold 14px Arial';
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let key in objects) {
                const [x, y] = key.split(',').map(Number);
                const sz = objects[key].size;
                if (sz === 2) {
                    const px = (x * CELL) + CELL;
                    const py = (y * CELL) + CELL;
                    ctx.fillText('2×2', px, py);
                }
            }

            updateAGVCount();
        }

        function shadeColor(color, percent) {
            let R = parseInt(color.substring(1,3),16);
            let G = parseInt(color.substring(3,5),16);
            let B = parseInt(color.substring(5,7),16);
            R = parseInt(R * (100 + percent) / 100);
            G = parseInt(G * (100 + percent) / 100);
            B = parseInt(B * (100 + percent) / 100);
            R = Math.min(255, Math.max(0, R));
            G = Math.min(255, Math.max(0, G));
            B = Math.min(255, Math.max(0, B));
            R = Math.round(R);
            G = Math.round(G);
            B = Math.round(B);
            let RR = (R.toString(16).length === 1) ? "0" + R.toString(16) : R.toString(16);
            let GG = (G.toString(16).length === 1) ? "0" + G.toString(16) : G.toString(16);
            let BB = (B.toString(16).length === 1) ? "0" + B.toString(16) : B.toString(16);
            return "#" + RR + GG + BB;
        }

        function updateAGVCount() {
            const waitCount = Object.values(objects)
                .filter(o => o.type === 4)
                .length;
            document.getElementById('agv-count').textContent = 
                `Wait Zones: ${waitCount} → Will generate ${waitCount} AGVs`;
        }

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('status').textContent = `Current Mode: ${modeNames[mode]}`;
            document.getElementById('status').style.color = modeStatusColors[mode];
        }

        function resetMap() {
            grid = Array.from({length: H}, () => Array(W).fill(0));
            objects = {};
            document.getElementById('goods-ids-input').value = ''; // 清空输入框
            drawGrid();
            document.getElementById('status').textContent = 'Map has been reset';
            document.getElementById('status').style.color = '#198754';
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const x = Math.floor(mx / CELL);
            const y = Math.floor(my / CELL);

            if (x < 0 || x >= W || y < 0 || y >= H) return;

            if (e.button === 0) { // 左键 - 放置
                let sz = currentSize;
                if (mode === 3) sz = 1; // 障碍物永远 size=1
                if (placeObject(x, y, mode, sz)) {
                    drawGrid();
                } else {
                    document.getElementById('status').textContent = 'Cannot place: area occupied or out of bounds';
                    document.getElementById('status').style.color = '#dc3545';
                }
            } 
            else if (e.button === 2) { // 右键 - 移除
                removeObjectAt(x, y);
                drawGrid();
            }
        });

        canvas.addEventListener('contextmenu', e => e.preventDefault());

        document.addEventListener('keydown', (e) => {
            // 移除数字切换 mode 的逻辑
            if (e.key === 's' || e.key === 'Enter') {
                exportMap();
            }
        });

        function exportMap() {
            let boxes = [], recvs = [], waits = [], obsts = [], agvs = [];

            let boxIdCounter = 0;
            for (let key in objects) {
                const [x, y] = key.split(',').map(Number);
                const {type, size, goods_ids} = objects[key];
                const item = { position: [x, y] };
                if (size === 2) item.size = 2;

                if (type === 1) {
                    item.box_id = boxIdCounter++;
                    item.goods_ids = goods_ids && goods_ids.length > 0 ? goods_ids : [item.box_id];
                    boxes.push(item);
                } else if (type === 2) {
                    item.receiver_id = recvs.length;
                    recvs.push(item);
                } else if (type === 4) {
                    item.wait_zone_id = waits.length;
                    waits.push(item);
                }
            }

            waits.forEach((wait, i) => {
                const agv = { agv_id: i };
                if (wait.size) agv.size = wait.size;
                agvs.push(agv);
            });

            for (let y = 0; y < H; y++) {
                for (let x = 0; x < W; x++) {
                    if (grid[y][x] === 3) {
                        obsts.push([x, y]);
                    }
                }
            }

            const mapData = {
                map: { width: W, height: H },
                boxes,
                receivers: recvs,
                wait_zones: waits,
                agvs,
                obstacles: obsts
            };

            const now = new Date();
            const ts = `${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}_${now.getHours().toString().padStart(2,'0')}${now.getMinutes().toString().padStart(2,'0')}${now.getSeconds().toString().padStart(2,'0')}`;
            const filename = `map_${ts}.json`;

            const blob = new Blob([JSON.stringify(mapData, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename; a.click();
            URL.revokeObjectURL(url);

            document.getElementById('status').textContent = `Exported → ${filename} (${agvs.length} AGVs)`;
            document.getElementById('status').style.color = '#0d6efd';
        }

        // 初始化
        drawGrid();
        setMode(1);
    </script>
</body>
</html>
